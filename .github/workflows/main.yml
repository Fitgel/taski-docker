# Обновили по что мы поменяли SQLite на PostgreSQL, а для него нужен 
# сервер(сам создать не может в отличии от SQLite)
# Чтобы установить и запустить сервер PostgreSQL:
# запускаем контейнер из образа postgres:13.10;
# прокидываем порт 5432 хоста (раннера) на такой же порт контейнера;
# указываем переменные окружения для запуска тестов, чтобы Django знал,
# куда отправлять запросы к БД: передаём доступы к БД, её адрес и порт.

name: Main Taski workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13.10
        env:
          POSTGRES_USER: ${{ secrets.SP17_DJANGO_USER }}
          POSTGRES_PASSWORD: ${{ secrets.SP17_DJANGO_PASS }}
          POSTGRES_DB: ${{ secrets.SP17_DJANGO_DBNAME }}
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install flake8==7.3.0 flake8-isort==7.0.0
          pip install -r ./backend/requirements.txt
      - name: Test with flake8 and django tests
        env:
          POSTGRES_USER: ${{ secrets.SP17_DJANGO_USER }}
          POSTGRES_PASSWORD: ${{ secrets.SP17_DJANGO_PASS }}
          POSTGRES_DB: ${{ secrets.SP17_DJANGO_DBNAME }}
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          python -m flake8 backend/
          cd backend/
          python manage.py test

  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taski_backend:latest

